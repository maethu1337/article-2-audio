<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article to Audio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Article 2 Audio</h1>
        <div id="user-greeting" class="user-greeting"></div>
        <textarea id="text-to-speak" rows="10" placeholder="Enter article text here..."></textarea>
        <div class="text-mode-toggle">
            <span class="toggle-label" id="label-clean">Clean Text</span>
            <label class="switch">
                <input type="checkbox" id="raw-article-toggle">
                <span class="slider"></span>
            </label>
            <span class="toggle-label" id="label-raw">Raw Article</span>
        </div>
        <div class="model-toggle">
            <label for="model-select">Voice Model:</label>
            <select id="model-select">
                <option value="gpt-4o-mini-tts" selected>gpt-4o-mini-tts</option>
                <option value="tts-1">tts-1</option>
            </select>
            <label for="voice-select">Voice:</label>
            <select id="voice-select">
                <option value="alloy">alloy</option>
                <option value="ash">ash</option>
                <option value="ballad">ballad</option>
                <option value="coral">coral</option>
                <option value="echo">echo</option>
                <option value="fable">fable</option>
                <option value="onyx" selected>onyx</option>
                <option value="nova">nova</option>
                <option value="sage">sage</option>
                <option value="shimmer">shimmer</option>
                <option value="verse">verse</option>
                <option value="marin">marin</option>
                <option value="cedar">cedar</option>
            </select>
        </div>
        <div class="controls">
            <button id="speak-btn" class="btn-blue">Generate Audio</button>
            <span class="progress-inline">
                <progress id="progress-bar" value="0" max="100"></progress>
                <!-- <span id="progress-label">loading 0%</span> -->
            </span>
            <button id="download-btn" class="btn-gray"  disabled>Download Audio</button>
            
        </div>
        <audio id="audio-player" controls></audio>
        <div class="playback-progress-container">
            <progress id="playback-progress" value="0" max="100"></progress>
            <!-- <span id="playback-label">playback 0%</span> -->
        </div>
        <div id="status" class="status"></div>
    </div>
    <div class="last-updated">Last update: 2026-03-14 08:59 CET</div>
    <script src="title.js"></script>
    <script src="script.js"></script>
</body>
</html>
